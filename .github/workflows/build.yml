name: Build DLL

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup MSVC Compiler
      uses: ilammy/msvc-dev-cmd@v1

    - name: Compile Core DLL
      run: |
        cl.exe /O2 /LD /EHsc main.cpp /Fe:hvh_core.dll user32.lib gdi32.lib

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: compiled-hvh-dll
        path: hvh_core.dll
